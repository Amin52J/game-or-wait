<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GameOrWait — Login Complete</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #08080e;
    color: #e2e4ea;
    font-family: Inter, system-ui, -apple-system, sans-serif;
  }
  .card {
    text-align: center;
    padding: 3rem 2rem;
    max-width: 380px;
  }
  .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: .5rem; }
  p { font-size: .9rem; color: #8b8fa3; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#10003;</div>
  <h1>Login successful!</h1>
  <p>Redirecting to GameOrWait&hellip;<br>You can close this tab.</p>
</div>
<script>
(function () {
  var deepLink = "GameOrWait://auth/callback";
  var qs = window.location.search;
  var hash = window.location.hash;

  if (qs) deepLink += qs;
  if (hash) deepLink += hash;

  window.location.href = deepLink;

  setTimeout(function () {
    try { window.close(); } catch (_) {}
  }, 1500);
})();
</script>
</body>
</html>
